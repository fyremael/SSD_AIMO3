name: Docs Sync

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "TASKS.md"
      - "configs/**"
      - "data/**"
      - "docs/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/docs-sync.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: write

jobs:
  refresh-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Refresh generated docs
        run: python scripts/update_docs.py

      - name: Commit updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/INDEX.md docs/STATUS.md docs/docs_summary.json
          if git diff --cached --quiet; then
            echo "No generated doc changes."
            exit 0
          fi
          git commit -m "docs: refresh generated indexes"
          git push
