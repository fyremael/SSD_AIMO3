inherits_from:
  - colab_gpu_a1.yaml

model:
  base_model_id: sshleifer/tiny-gpt2

paths:
  eval_manifest_jsonl: data/fixture_eval_samples_a1.jsonl
  unlabeled_prompt_manifest_jsonl: data/fixture_unlabeled_prompts.jsonl
  problem_metadata_jsonl: data/fixture_problem_metadata.jsonl

inputs:
  prompt_input_jsonl: data/fixture_unlabeled_prompts.jsonl
  eval_input_jsonl: data/fixture_eval_samples_a1.jsonl

generation:
  command: '"{python_executable}" scripts/colab_hf_generate.py --input-jsonl "{input_jsonl}" --output-jsonl "{output_jsonl}" --summary-json "{output_dir}/hf_generate_summary.json" --model-id "{model_id}" {tokenizer_id_arg} {adapter_path_arg} {trust_remote_code_flag} --prompt-field rendered_prompt_text --output-field "{generation_field}" --batch-size 1 --max-new-tokens 64 --temperature 0.7 --top-p 0.95 --top-k 50 --do-sample --dtype float32 --quantization none'

training:
  max_seq_length: 512
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  launcher:
    enabled: true
    command: '"{python_executable}" scripts/colab_train_lora.py --dataset-path "{dataset_path}" --output-dir "{output_dir}/adapter" --summary-json "{output_dir}/adapter_summary.json" --model-id "{model_id}" --max-seq-length {max_seq_length} --learning-rate {learning_rate} --num-train-epochs {num_train_epochs} --per-device-train-batch-size {per_device_train_batch_size} --gradient-accumulation-steps {gradient_accumulation_steps} --dtype float32 --quantization none'
