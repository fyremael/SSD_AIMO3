inherits_from:
  - a1_naive_ssd.yaml

model:
  base_model_id: REPLACE_WITH_HF_MODEL_ID
  trust_remote_code: false

paths:
  eval_manifest_jsonl: REPLACE_WITH_EVAL_PROMPTS_JSONL
  unlabeled_prompt_manifest_jsonl: REPLACE_WITH_UNLABELED_PROMPTS_JSONL
  problem_metadata_jsonl: REPLACE_WITH_PROBLEM_METADATA_JSONL

prompting:
  template_name: template_strict_extractable

inputs:
  prompt_input_jsonl: REPLACE_WITH_UNLABELED_PROMPTS_JSONL
  eval_input_jsonl: REPLACE_WITH_EVAL_GENERATIONS_JSONL

generation:
  backend: command_jsonl
  command: '"{python_executable}" scripts/colab_hf_generate.py --input-jsonl "{input_jsonl}" --output-jsonl "{output_jsonl}" --summary-json "{output_dir}/hf_generate_summary.json" --model-id "{model_id}" {tokenizer_id_arg} {adapter_path_arg} {trust_remote_code_flag} --prompt-field rendered_prompt_text --output-field "{generation_field}" --batch-size 2 --max-new-tokens 256 --temperature 0.35 --top-p 0.9 --top-k 40 --do-sample --dtype auto --quantization 4bit --use-chat-template --system-prompt "You are a careful math solver. Reason step by step and end with \\boxed{{answer}} followed by Final Answer: answer. Do not write anything after the Final Answer line."'

training:
  save_dataset_only: false
  launcher:
    enabled: true
    command: '"{python_executable}" scripts/colab_train_lora.py --dataset-path "{dataset_path}" --output-dir "{output_dir}/adapter" --summary-json "{output_dir}/adapter_summary.json" --model-id "{model_id}" --max-seq-length {max_seq_length} --learning-rate {learning_rate} --num-train-epochs {num_train_epochs} --per-device-train-batch-size {per_device_train_batch_size} --gradient-accumulation-steps {gradient_accumulation_steps} --dtype auto --quantization 4bit'
