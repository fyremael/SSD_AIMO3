default_pair:
  prompting:
    templates:
      template_a: |
        Solve the following olympiad-style math problem carefully.
        Show enough reasoning to justify the result and end with `Final Answer: <integer>`.

        Problem:
        {prompt_text}
      template_b: |
        You are solving an AIMO-style math problem with a non-negative integer answer in [0, 99999].
        Work step by step, then conclude with both `\boxed{answer}` and `Final Answer: answer`.

        Problem:
        {prompt_text}
      template_strict_extractable: |
        Solve the following math problem carefully.
        The answer must be a single non-negative integer in [0, 99999].
        You may show reasoning, but your final two lines must be exactly:
        \boxed{answer}
        Final Answer: answer
        Do not write any text after the `Final Answer:` line.

        Problem:
        {prompt_text}
